services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dt_web
    ports:
      - 80:80
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    networks:
      - dt_network

  mysql:
    image: mysql:8.0
    container_name: dt_mysql
    restart: always
    environment:
      - MYSQL_DATABASE=dowotools
      - MYSQL_USER=agent_fox
      - MYSQL_PASSWORD=agent_fox_pass
      - MYSQL_ROOT_PASSWORD=root_pass
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dt_network

networks:
  dt_network:
    driver: bridge

volumes:
  mysql_data:
